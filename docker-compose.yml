version: "3.9"

x-default-env: &default-env
  - ${ENV_FILE:-.env}

services:
  postgres:
    image: postgres:15-alpine
    container_name: huao-postgres
    restart: unless-stopped
    env_file: *default-env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-huao}
      POSTGRES_USER: ${POSTGRES_USER:-huao_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - ${POSTGRES_DATA_ROOT:-./.postgres-data}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - huao

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: huao-whatsapp-bot:latest
    container_name: huao-app
    restart: unless-stopped
    env_file: *default-env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - ${STORAGE_ROOT:-.}/auth_info:/app/auth_info
      - ${STORAGE_ROOT:-.}/sessions:/app/server/sessions
      - ${STORAGE_ROOT:-.}/uploads:/app/server/uploads
      - ${STORAGE_ROOT:-.}/logs:/app/server/logs
      - ${STORAGE_ROOT:-.}/backups:/app/backups
    networks:
      - huao

  caddy:
    image: caddy:2
    container_name: huao-caddy
    restart: unless-stopped
    profiles: ["prod"]
    env_file: *default-env
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      ACME_AGREE: "true"
    volumes:
      - ${CADDYFILE_PATH:-./Caddyfile}:/etc/caddy/Caddyfile:ro
      - ${STORAGE_ROOT:-.}/caddy-data:/data
      - ${STORAGE_ROOT:-.}/caddy-config:/config
    networks:
      - huao

networks:
  huao:
    driver: bridge


